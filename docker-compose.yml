version: '3.8'

services:
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthai_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: backend
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/healthai_dev
      JWT_SECRET: super-secret-health-ai-key
      CORS_ORIGIN: http://localhost:5174
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    container_name: frontend
    build: ./frontend
    ports:
      - '5174:5174'
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
